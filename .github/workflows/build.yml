name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        env:
          BRAND_CONFIG_URLS: ${{ secrets.BRAND_CONFIG_URLS }}
          BRAND_CONFIG_KEY: ${{ secrets.BRAND_CONFIG_KEY }}
        run: |
          dart run setup.dart
          flutter build apk --release \
            --dart-define=BRAND_CONFIG_URLS="$BRAND_CONFIG_URLS" \
            --dart-define=BRAND_CONFIG_KEY="$BRAND_CONFIG_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
